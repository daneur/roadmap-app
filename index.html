<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Roadmap App</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1>Roadmap</h1>
  <div class="muted">Now = weeks to months • Next = months to a year • Later = year+</div>

  <div class="panel">
    <div class="row" style="margin-bottom: 10px;">
      <label class="label">
        Group by
        <select id="groupBySelect">
          <option value="platform">Platform</option>
          <option value="theme">Theme</option>
          <option value="team">Team</option>
          <option value="none">None</option>
        </select>
      </label>

      <button id="exportBtn">Export JSON</button>
      <label class="fileLabel">
        Import JSON
        <input id="importFile" type="file" accept="application/json" />
      </label>

      <button id="snapshotBtn" title="Save a point-in-time snapshot">Create Snapshot</button>
      <button id="clearAllBtn" class="danger" title="Clears all cards and snapshots">Clear ALL</button>
    </div>

    <div class="row">
      <input id="cardTitleInput" type="text" placeholder="New card title..." style="min-width: 260px;" />

      <input id="platformInput" type="text" placeholder="Platform (e.g., D365)" />
      <input id="themeInput" type="text" placeholder="Theme (e.g., Resilience)" />
      <input id="teamInput" type="text" placeholder="Team (e.g., DevOps)" />

      <select id="horizonSelect">
        <option value="now">Now</option>
        <option value="next">Next</option>
        <option value="later">Later</option>
      </select>

      <button id="addCardBtn">Add card</button>
    </div>

    <div class="row" style="margin-top: 10px;">
      <label class="label">
        Show snapshot
        <select id="snapshotSelect"></select>
      </label>
      <span class="hint">Snapshots show a read-only overlay (later we can add variance indicators).</span>
    </div>
  </div>

  <div id="lanesContainer"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
